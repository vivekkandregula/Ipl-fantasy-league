<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Fantasy League Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app-container">
        <!-- Background decorative elements for a premium aesthetic -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>

        <header class="header">
            <h1>IPL Fantasy <span style="font-weight: 300;">Live</span></h1>
            <p>Compete with friends using real-world match multipliers!</p>
            
            <div style="margin-top: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 1.5rem;">
                <div class="progress-box" style="background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 0.6rem 1rem; border-radius: 8px; text-align: center;">
                    <span style="color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Tournament Progress</span>
                    <div style="margin-top: 0.4rem; font-weight: 600;">
                        <span id="matches-done" style="color: #4db8ff; font-size: 1.2rem;">0</span> <span style="font-size: 0.9rem; color: var(--text-muted);">Matches Done</span> 
                        <span style="color: var(--text-muted); font-size: 0.85rem; margin-left: 0.5rem;" id="matches-remaining">(74 Remaining)</span>
                    </div>
                </div>

                <div>
                    <button id="sync-results-btn" class="primary-btn" style="background: rgba(32, 201, 151, 0.15); border: 1px solid #20c997; color: #20c997; font-size: 0.95rem; padding: 0.6rem 1.2rem; height: 100%;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 0.4rem; margin-top: -2px;"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-10.26l3.08-3.08"/></svg>
                        Sync Latest Results
                    </button>
                    <div id="last-synced-time" style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.6rem;"></div>
                </div>
            </div>
        </header>

        <div class="top-grid">
            <!-- Global Match Breakdown (Now wide table) -->
            <div class="glass module breakdown-module">
                <h2>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                    Live Match Breakdown
                </h2>
                <div class="pulse-indicator" style="position:absolute; right: 2rem; top: 2.2rem;"></div>
                <div id="breakdown-list" style="overflow-x: auto;">
                    <!-- Table rendered by JS -->
                </div>
            </div>

            <!-- Global Leaderboard -->
            <div class="glass module leaderboard-module">
                <h2>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                    Global Leaderboard
                </h2>
                <p class="subtitle">Ranked by total points</p>
                <div id="leaderboard-list" class="leaderboard-list">
                    <!-- Dynamic -->
                </div>
            </div>
        </div>

        <!-- Season Graph Module -->
        <div class="glass module graph-module" style="margin-bottom: 2rem;">
            <h2>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                Ranking Timeline Tracker
            </h2>
            <div style="position: relative; height: 350px; width: 100%;">
                <canvas id="scoreChart"></canvas>
            </div>
        </div>

        <!-- All Squads Overview -->
        <div class="glass module overview-module" style="margin-bottom: 1.5rem;">
            <h2>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                All Player Squads
            </h2>
            <div id="all-squads-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem;">
                <div class="empty-state">No players added.</div>
            </div>
        </div>

    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
